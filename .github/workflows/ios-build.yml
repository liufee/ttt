name: iOS Build

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      # 1️⃣ Node 环境
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: npm

      # 2️⃣ 安装 JS 依赖（关键）
      - name: Install JS deps
        run: |
          npm ci

      # 3️⃣ CocoaPods
      - name: Install Pods
        run: |
          cd ios
          pod install

      # 4️⃣ iOS Build（修复你刚才那个错误）
      - name: Build iOS
        run: |
          cd ios
          xcodebuild \
            -workspace FeehiApp.xcworkspace \
            -scheme FeehiApp \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            build
