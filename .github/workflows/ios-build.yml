name: iOS IPA Build

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # Node
      - uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: npm

      - run: npm ci

      # Go + gomobile
      - uses: actions/setup-go@v4
        with:
          go-version: 1.23.5

      - run: |
          go install golang.org/x/mobile/cmd/gomobile@v0.0.0-20250711185624-d5bb5ecc55c0
          go install golang.org/x/mobile/cmd/gobind@v0.0.0-20250711185624-d5bb5ecc55c0

      - run: |
          chmod +x go/build-ios-golib.sh
          ./go/build-ios-golib.sh

      # Pods
      - run: |
          cd ios
          pod install

      # Archive
      - name: Archive
        run: |
          cd ios
          set -o pipefail
          xcodebuild \
          -workspace FeehiApp.xcworkspace \
          -scheme FeehiApp \
          -configuration Release \
          -sdk iphoneos \
          clean build 2>&1 | tee build.log || true

      - name: Show errors
        run: |
          echo "===== ERRORS ====="
          grep -i "error:" ios/build.log || true

      - name: Show last logs
        run: |
          echo "===== LAST 200 LINES ====="
          tail -n 200 ios/build.log

      # 导出 IPA
      - name: Export IPA
        run: |
          cd ios

          cat > ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>development</string>
              <key>signingStyle</key>
              <string>manual</string>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath build/FeehiApp.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath build/ipa

      # 上传
      - uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: ios/build/ipa
