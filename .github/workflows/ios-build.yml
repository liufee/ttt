name: iOS Build

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install deps
        run: |
          npm install

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Build iOS (no signing)
        run: |
          cd ios
          xcodebuild \
            -workspace FeehiApp.xcworkspace \
            -scheme FeehiApp \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 14' \
            build
