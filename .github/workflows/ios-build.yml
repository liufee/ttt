name: iOS IPA Build

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # Node
      - uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: npm

      - run: npm ci

      # Go + gomobile
      - uses: actions/setup-go@v4
        with:
          go-version: 1.23.5

      - run: |
          go install golang.org/x/mobile/cmd/gomobile@v0.0.0-20250711185624-d5bb5ecc55c0
          go install golang.org/x/mobile/cmd/gobind@v0.0.0-20250711185624-d5bb5ecc55c0

      - run: |
          chmod +x go/build-ios-golib.sh
          ./go/build-ios-golib.sh

      # 安装证书
      - name: Install Certificate
        run: |
          echo "$IOS_P12_BASE64" | base64 --decode > cert.p12

          security create-keychain -p "" build.keychain
          security import cert.p12 -k build.keychain -P "$IOS_P12_PASSWORD" -T /usr/bin/codesign
          security list-keychains -s build.keychain
          security unlock-keychain -p "" build.keychain

      # 安装 profile
      - name: Install Provisioning Profile
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$IOS_PROFILE_BASE64" | base64 --decode > profile.mobileprovision
          cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/

      # Pods
      - run: |
          cd ios
          pod install

      # Archive
      - name: Archive
        run: |
          cd ios
          xcodebuild \
            -workspace FeehiApp.xcworkspace \
            -scheme FeehiApp \
            -configuration Release \
            -archivePath $PWD/build/FeehiApp.xcarchive \
            archive \
            DEVELOPMENT_TEAM=$IOS_TEAM_ID

      # 导出 IPA
      - name: Export IPA
        run: |
          cd ios

          cat > ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>development</string>
              <key>signingStyle</key>
              <string>manual</string>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath build/FeehiApp.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath build/ipa

      # 上传
      - uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: ios/build/ipa
