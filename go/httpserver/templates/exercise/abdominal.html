<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="//assets.feehi.com/logo/square/favicon-32x32.png">
  <title>腹肌锻炼</title>
  <style>
    body { margin:0; font-family: Arial, sans-serif; background-color: #f9f9f9; }
    .back-btn {position: fixed;top: 0px;left: 15px;background: #4A90E2;color: #fff;padding: 2px 12px;border-radius: 6px;text-decoration: none;font-weight: bold;z-index: 1000;box-shadow: 0 2px 6px rgba(0,0,0,0.2);}
    .back-btn:hover {background: #357ABD;}

    .scroll { overflow-y: auto; }
    .video-container {width: 100%;max-width: 960px; /* 电脑显示更大 */aspect-ratio: 16 / 9; /* 保持16:9比例 */margin: 20px auto;background-color: #000;position: relative;}
    .video-container video {width: 100%;height: 100%;display: block;object-fit: cover; /* 或contain，保证填满容器 */}

    .loading { position: absolute; top:0; left:0; right:0; bottom:0; display:flex; justify-content:center; align-items:center; color:#fff; background: rgba(0,0,0,0.6); font-size:18px; }
    .content { max-width: 640px; margin:auto; background:#fff; padding:15px; }
    h1 { font-size:24px; margin-bottom:10px; }
    p { font-size:16px; color:#555; margin-bottom:20px; }

    .buttons { display:flex; gap:4px; margin-bottom:20px; flex-wrap:wrap; }
    .btn { flex:1; padding:10px; border-radius:5px; font-weight:bold; color:#fff; text-align:center; cursor:pointer; user-select:none; }
    .btn.disabled { pointer-events:none; opacity:0.5; }

    .log-container {margin-top: 20px;max-width: 640px;margin-left: auto;margin-right: auto;padding: 0 10px;}
    .log-title {font-size: 18px;font-weight: bold;margin-bottom: 12px;}
    .scroll-log {max-height: 300px; /* 控制滚动高度 */overflow-y: auto;border-top: 1px solid #e5e5e5;padding-top: 8px;}
    .log-entry {font-size: 14px;color: #333;margin-bottom: 5px;}
  </style>
</head>
<body>
<a href="/exercise" class="back-btn">← 返回列表</a>
<div class="scroll">
  <div class="video-container">
    <div id="loading" class="loading">视频加载中...</div>
    <video id="exerciseVideo" preload="auto"></video>
  </div>

  <div class="content">
    <h1 id="actionTitle">开始锻炼</h1>
    <p id="actionDesc">准备开始锻炼</p>

    <div class="buttons">
      <div id="playBtn" class="btn" style="background:#F59E0B">开始</div>
      <div id="prevBtn" class="btn disabled" style="background:#9CA3AF">上个</div>
      <div id="nextBtn" class="btn disabled" style="background:#9CA3AF">下个</div>
      <div id="skipBtn" class="btn disabled" style="background:#9CA3AF">跳休</div>
      <div id="muteBtn" class="btn" style="background:#7C3AED">声音</div>
      <div id="doneBtn" class="btn disabled" style="background:#9E9E9E">完成</div>
    </div>

    <div class="log-container">
      <div class="log-title">最近12天的锻炼记录</div>
      <div class="scroll-log">
        {{range .exercises}}
        <div class="log-entry">{{ .StartAt.Format "2006-01-02" }} - 从 {{ .StartAt.Format "15:04:05" }} 到 {{ .EndAt.Format "15:04:05" }}</div>
        {{end}}
      </div>
    </div>

  </div>
</div>

<script>
  const video = document.getElementById('exerciseVideo');
  const loadingEl = document.getElementById('loading');

  const playBtn = document.getElementById('playBtn');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  const skipBtn = document.getElementById('skipBtn');
  const muteBtn = document.getElementById('muteBtn');
  const doneBtn = document.getElementById('doneBtn');

  const actionTitle = document.getElementById('actionTitle');
  const actionDesc = document.getElementById('actionDesc');

  let paused = true;
  let muted = false;
  let currentAction = -1;
  let showSkipRest = false;
  let hasEnded = false;
  let startAt = null;

  const actions = [
    {description: '1-1', start:4.5, end:55, name:'瑜伽垫辅助卷腹', duration:50},
    {description: '1-2', start:67, end:103, name:'反向屈体转腹', duration:36},
    {description: '1-3', start:115.5, end:149, name:'简易俄罗斯转体', duration:33},
    {description: '1-4', start:171.5, end:201, name:'左侧屈膝', duration:30},
    {description: '1-5', start:213, end:240, name:'右侧屈膝', duration:30},
    {description: '1-6', start:243.5, end:272, name:'腹部拉升', duration:30},
    {description: '2-1', start:283.5, end:334.5, name:'瑜伽垫辅助卷腹', duration:50},
    {description: '2-2', start:346.5, end:382.5, name:'反向屈体转腹', duration:36},
    {description: '2-3', start:395.5, end:429, name:'简易俄罗斯转体', duration:33},
    {description: '2-4', start:451.5, end:490, name:'平板支撑', duration:38},
    {description: '2-5', start:492.5, end:521, name:'腹部拉升', duration:30},
    {description: '3-1', start:532.5, end:583, name:'瑜伽垫辅助卷腹', duration:50},
    {description: '3-2', start:595.5, end:632, name:'反向屈体转腹', duration:36},
    {description: '3-3', start:644.5, end:678, name:'简易俄罗斯转体', duration:33},
    {description: '3-4', start:700, end:730, name:'平板支撑交替抬腿', duration:30},
    {description: '3-5', start:733.5, end:762, name:'真空腹训练', duration:30}
  ];

  const DB_NAME = 'exerciseDB';
  const STORE_NAME = 'videos';
  const VIDEO_KEY = 'keep_1_1';

  async function openDB() {
    return new Promise((resolve, reject) => {
      const request = indexedDB.open(DB_NAME, 1);
      request.onupgradeneeded = (e) => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains(STORE_NAME)) {
          db.createObjectStore(STORE_NAME);
        }
      };
      request.onsuccess = (e) => resolve(e.target.result);
      request.onerror = (e) => reject(e.target.error);
    });
  }

  async function saveVideoToIndexedDB(blob) {
    const db = await openDB();
    const tx = db.transaction(STORE_NAME, 'readwrite');
    tx.objectStore(STORE_NAME).put(blob, VIDEO_KEY);
    await tx.done;
  }

  async function loadVideoFromIndexedDB() {
    const db = await openDB();
    const tx = db.transaction(STORE_NAME, 'readonly');
    const request = tx.objectStore(STORE_NAME).get(VIDEO_KEY);
    return new Promise((resolve, reject) => {
      request.onsuccess = e => resolve(e.target.result);
      request.onerror = e => reject(e.target.error);
    });
  }

  async function loadVideo() {
    loadingEl.style.display = 'flex';

    let cachedBlob = await loadVideoFromIndexedDB();

    if (cachedBlob) {
      if (!(cachedBlob instanceof Blob)) {
        console.warn('IndexedDB 缓存不是 Blob，正在重新转换...');
        cachedBlob = new Blob([cachedBlob], { type: 'video/mp4' });
        await saveVideoToIndexedDB(cachedBlob); // 覆盖保存为正确 Blob
      }
      video.src = URL.createObjectURL(cachedBlob);
      loadingEl.style.display = 'none';
      return;
    }

    try {
      const fetchedBlob = await fetch('https://oos-cn.ctyunapi.cn/feehi/keep_1_1.mp4?Signature=F6Yx9IGBmJlyJKStRJ%2Be0TACxos%3D&AWSAccessKeyId=b7eaa4d0ff33cc61107e&Expires=865773480453')
              .then(res => res.blob());
      video.src = URL.createObjectURL(fetchedBlob);
      await saveVideoToIndexedDB(fetchedBlob);
      loadingEl.style.display = 'none';
    } catch(e){
      loadingEl.innerText='下载失败';
      console.error(e);
    }
  }

  async function saveRecord(){
    try {
      if(startAt === null){
        return;
      }
      const params = new URLSearchParams();
      const offset = 8 * 60 * 60 * 1000;
      params.append('type', '1');
      params.append('start_time', new Date(startAt.getTime() + offset).toISOString().replace('Z', '').split('.')[0]);
      params.append('end_time', new Date(Date.now() + offset).toISOString().replace('Z', '').split('.')[0]);
      const result = await fetch('/exercise/new', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: params,
      });
      if(result.status !== 200){
        if(result.status === 400){
          alert(await result.text());
          return;
        }
        alert('保存失败');
      }
    } catch(e){
      alert('保存失败');
      console.error(e);
    }
  }

  function updateActionUI() {
    // 更新标题和描述
    if (currentAction >= 0) {
      actionTitle.innerText = actions[currentAction].description + ' ' + actions[currentAction].name;
      actionDesc.innerText = `持续时间：${actions[currentAction].duration}秒`;
    } else {
      actionTitle.innerText = '开始锻炼';
      actionDesc.innerText = '准备开始锻炼';
    }

    // 按钮禁用状态
    prevBtn.classList.toggle('disabled', currentAction <= 0);
    nextBtn.classList.toggle('disabled', currentAction >= actions.length - 1 || currentAction === -1);
    skipBtn.classList.toggle('disabled', !showSkipRest);
    doneBtn.classList.toggle('disabled', paused || hasEnded || currentAction === -1);

    // 按钮颜色
    playBtn.style.background = paused ? '#F59E0B' : '#2563EB';
    prevBtn.style.background = currentAction <= 0 ? '#9CA3AF' : '#475569';
    nextBtn.style.background = (currentAction >= actions.length - 1 || currentAction === -1) ? '#9CA3AF' : '#475569';
    skipBtn.style.background = showSkipRest ? '#475569' : '#9CA3AF';
    muteBtn.style.background = muted ? '#6B7280' : '#7C3AED';
    doneBtn.style.background = (paused || hasEnded || currentAction === -1) ? '#9E9E9E' : '#16A34A';

    // 按钮文本逻辑
    if (paused) {
      playBtn.innerText = currentAction === -1 ? '开始' : '继续';
    } else {
      playBtn.innerText = '暂停';
    }
  }

  function handlePlayPause(){
    paused = !paused;
    if(paused) video.pause(); else video.play();
    if(currentAction===-1){ currentAction=0; startAt=new Date(); hasEnded=false; }
    updateActionUI();
  }
  function handleNextAction(){ if(currentAction<actions.length-1){ showSkipRest=false; video.currentTime=actions[currentAction+1].start; currentAction++; updateActionUI(); } }
  function handlePrevAction(){ if(currentAction>0){ showSkipRest=false; video.currentTime=actions[currentAction-1].start; currentAction--; updateActionUI(); } }

  video.addEventListener('timeupdate', ()=>{
    for(let i=0;i<actions.length-1;i++){
      if(video.currentTime>actions[i].end && video.currentTime<actions[i+1].start-2){
        if([4,9,14].includes(i)) continue;
        showSkipRest=true;
      } else if(Math.floor(video.currentTime)===Math.floor(actions[i].start-2)){
        showSkipRest=false; currentAction=i;
      }
    }
    updateActionUI();
  });

  video.addEventListener('ended', async()=>{
    hasEnded=true;
    await saveRecord();
    try {
      const params = new URLSearchParams();
      const now = Date.now();
      const offset = 8 * 60 * 60 * 1000;
      params.append('type', '3');
      params.append('start_time', new Date(now + offset + 10 * 60 * 1000).toISOString().replace('Z', '').split('.')[0]);
      params.append('end_time', new Date(now + offset + 90 * 60 * 1000).toISOString().replace('Z', '').split('.')[0]);
      params.append('situp', '520');
      params.append('pushup', '130');
      params.append('curlup', '117');
      params.append('legsUpTheWallPose', '3');
      const result = await fetch('/exercise/new', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: params,
      });
      if(result.status !== 200){
        if(result.status === 400){
          alert(await result.text());
          return;
        }
        alert('保存失败');
      }
    } catch(e){
      alert('保存失败');
      console.error(e);
    }
    location.reload();
  });

  playBtn.onclick=handlePlayPause;
  prevBtn.onclick=handlePrevAction;
  nextBtn.onclick=handleNextAction;
  skipBtn.onclick=handleNextAction;
  muteBtn.onclick=()=>{muted=!muted; video.muted=muted; muteBtn.innerText=muted?'静音':'声音'; muteBtn.style.background=muted?'#6B7280':'#7C3AED';};
  doneBtn.onclick=async ()=>{ hasEnded=true; paused=true; video.pause(); await saveRecord();location.reload(); };

  loadVideo();
  video.addEventListener('loadedmetadata', () => {
    video.currentTime = 3;
  });
  updateActionUI();
</script>
</body>
</html>
